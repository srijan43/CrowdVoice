services:
  # -------------------------
  # Node.js Backend API
  # -------------------------
  - type: web
    name: crowdvoice-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false # Reminder: Set your MongoDB connection string securely in the Render Dashboard!

  # -------------------------
  # React Frontend (Static Site)
  # -------------------------
  - type: web
    name: crowdvoice-frontend
    env: static
    rootDir: backend/client
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    # Ensure client-side routing works by rewriting all requests to index.html
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        sync: false # Set this in the Render Dashboard to your backend URL + /api (e.g., https://crowdvoice-backend-xyz.onrender.com/api)
